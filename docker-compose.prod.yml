services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: root
    entrypoint: ["/init/entrypoint.sh"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_MEMORY_LIMIT_MB: "400"
      DB_NAME: "LibraryDB"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./db-init:/init:ro
    restart: unless-stopped
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "${DB_SA_PASSWORD}" -No
        -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name='LibraryDB') RAISERROR('not ready',16,1)"
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 90s

  app:
    image: ${ECR_REGISTRY}/library-app:${APP_VERSION}
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__LibraryDb: "Server=db,1433;Database=LibraryDB;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
