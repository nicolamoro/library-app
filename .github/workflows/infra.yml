name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - bootstrap
          - apply
          - destroy

permissions:
  contents: read

# Serialize all infra runs to prevent racing on Terraform state or AWS resources.
concurrency:
  group: infra
  cancel-in-progress: false

jobs:
  # ── Bootstrap: create S3 state bucket + DynamoDB lock table ──────────────────
  # Run this once before the first 'apply'. Requires only the 3 AWS secrets/vars.
  bootstrap:
    if: inputs.action == 'bootstrap'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create S3 state bucket
        id: s3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="library-app-tfstate-${ACCOUNT_ID}"

          if [ "$AWS_REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-bucket-tagging \
            --bucket "$BUCKET" \
            --tagging 'TagSet=[{Key=Project,Value=library-app}]'

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Create DynamoDB lock table
        id: dynamo
        run: |
          TABLE="library-app-tflock"
          aws dynamodb create-table \
            --table-name "$TABLE" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "$AWS_REGION" \
            --tags Key=Project,Value=library-app
          echo "table=$TABLE" >> "$GITHUB_OUTPUT"

      - name: Print results
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Bootstrap complete

          Save these values as GitHub secrets before running \`apply\`:

          | Secret | Value |
          |--------|-------|
          | \`TF_BACKEND_BUCKET\` | \`${{ steps.s3.outputs.bucket }}\` |
          | \`TF_BACKEND_TABLE\`  | \`${{ steps.dynamo.outputs.table }}\` |
          EOF

  # ── Apply: provision EC2, ECR, IAM, EIP ──────────────────────────────────────
  apply:
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/tf-setup
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          backend-bucket: ${{ secrets.TF_BACKEND_BUCKET }}
          backend-table: ${{ secrets.TF_BACKEND_TABLE }}

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="backend_bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Read outputs
        id: tf
        working-directory: infra/terraform
        run: |
          echo "elastic_ip=$(terraform output -raw elastic_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$(terraform output -raw ecr_registry)" >> "$GITHUB_OUTPUT"

      - name: Store secrets in SSM Parameter Store
        env:
          DB_SA_PASSWORD: ${{ secrets.DB_SA_PASSWORD }}
          ECR_REGISTRY: ${{ steps.tf.outputs.ecr_registry }}
          S3_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
        run: |
          # AWS rejects --tags together with --overwrite, so tag in a separate call.
          put_param() {
            local name=$1 value=$2 type=$3
            aws ssm put-parameter --name "$name" --value "$value" --type "$type" --overwrite
            aws ssm add-tags-to-resource \
              --resource-type Parameter --resource-id "$name" \
              --tags Key=Project,Value=library-app
          }
          put_param /library-app/db-sa-password "$DB_SA_PASSWORD" SecureString
          put_param /library-app/ecr-registry   "$ECR_REGISTRY"   String
          put_param /library-app/s3-bucket      "$S3_BUCKET"      String

      - name: Print results
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Apply complete

          | Output | Value |
          |--------|-------|
          | Elastic IP | \`${{ steps.tf.outputs.elastic_ip }}\` |
          | **Instance ID** | \`${{ steps.tf.outputs.instance_id }}\` |
          | ECR Registry | \`${{ steps.tf.outputs.ecr_registry }}\` |

          **Next step:** save \`${{ steps.tf.outputs.instance_id }}\` as the \`EC2_INSTANCE_ID\` GitHub secret.

          App will be available at: http://${{ steps.tf.outputs.elastic_ip }}:8080 after the first deploy.
          EOF

  # ── Destroy: tear down all AWS resources ─────────────────────────────────────
  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/tf-setup
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          backend-bucket: ${{ secrets.TF_BACKEND_BUCKET }}
          backend-table: ${{ secrets.TF_BACKEND_TABLE }}

      - name: Terraform destroy
        working-directory: infra/terraform
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="backend_bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Delete SSM parameters
        run: |
          for param in \
            /library-app/db-sa-password \
            /library-app/ecr-registry \
            /library-app/s3-bucket \
            /library-app/app-version; do
            aws ssm delete-parameter --name "$param" 2>/dev/null || true
          done
          echo "SSM parameters deleted."
