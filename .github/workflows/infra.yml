name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - bootstrap
          - apply
          - destroy

jobs:
  # ── Bootstrap: create S3 state bucket + DynamoDB lock table ──────────────────
  # Run this once before the first 'apply'. Requires only the 3 AWS secrets.
  bootstrap:
    if: inputs.action == 'bootstrap'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create S3 state bucket
        id: s3
        run: |
          BUCKET="library-app-tfstate-$(openssl rand -hex 4)"
          REGION="${{ secrets.AWS_REGION }}"

          if [ "$REGION" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-bucket-tagging \
            --bucket "$BUCKET" \
            --tagging 'TagSet=[{Key=Project,Value=library-app}]'

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Create DynamoDB lock table
        id: dynamo
        run: |
          TABLE="library-app-tflock"
          aws dynamodb create-table \
            --table-name "$TABLE" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "${{ secrets.AWS_REGION }}" \
            --tags Key=Project,Value=library-app
          echo "table=$TABLE" >> "$GITHUB_OUTPUT"

      - name: Print results
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Bootstrap complete

          Save these values as GitHub secrets before running \`apply\`:

          | Secret | Value |
          |--------|-------|
          | \`TF_BACKEND_BUCKET\` | \`${{ steps.s3.outputs.bucket }}\` |
          | \`TF_BACKEND_TABLE\`  | \`${{ steps.dynamo.outputs.table }}\` |
          EOF

  # ── Apply: provision EC2, ECR, IAM, EIP ──────────────────────────────────────
  apply:
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="backend_bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Read outputs
        id: tf
        working-directory: infra/terraform
        run: |
          echo "elastic_ip=$(terraform output -raw elastic_ip)"      >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw instance_id)"    >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$(terraform output -raw ecr_registry)"  >> "$GITHUB_OUTPUT"

      - name: Store secrets in SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name  "/library-app/db-sa-password" \
            --value "${{ secrets.DB_SA_PASSWORD }}" \
            --type  "SecureString" \
            --overwrite \
            --tags  Key=Project,Value=library-app 2>/dev/null || \
          aws ssm put-parameter \
            --name  "/library-app/db-sa-password" \
            --value "${{ secrets.DB_SA_PASSWORD }}" \
            --type  "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name  "/library-app/ecr-registry" \
            --value "${{ steps.tf.outputs.ecr_registry }}" \
            --type  "String" \
            --overwrite \
            --tags  Key=Project,Value=library-app 2>/dev/null || \
          aws ssm put-parameter \
            --name  "/library-app/ecr-registry" \
            --value "${{ steps.tf.outputs.ecr_registry }}" \
            --type  "String" \
            --overwrite

          aws ssm put-parameter \
            --name  "/library-app/s3-bucket" \
            --value "${{ secrets.TF_BACKEND_BUCKET }}" \
            --type  "String" \
            --overwrite \
            --tags  Key=Project,Value=library-app 2>/dev/null || \
          aws ssm put-parameter \
            --name  "/library-app/s3-bucket" \
            --value "${{ secrets.TF_BACKEND_BUCKET }}" \
            --type  "String" \
            --overwrite

      - name: Print results
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Apply complete

          | Output | Value |
          |--------|-------|
          | Elastic IP | \`${{ steps.tf.outputs.elastic_ip }}\` |
          | **Instance ID** | \`${{ steps.tf.outputs.instance_id }}\` |
          | ECR Registry | \`${{ steps.tf.outputs.ecr_registry }}\` |

          **Next step:** save \`${{ steps.tf.outputs.instance_id }}\` as the \`EC2_INSTANCE_ID\` GitHub secret.

          App will be available at: http://${{ steps.tf.outputs.elastic_ip }}:8080 after the first deploy.
          EOF

  # ── Destroy: tear down all AWS resources ─────────────────────────────────────
  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform destroy
        working-directory: infra/terraform
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="backend_bucket=${{ secrets.TF_BACKEND_BUCKET }}"

      - name: Delete SSM parameters
        run: |
          for param in \
            /library-app/db-sa-password \
            /library-app/ecr-registry \
            /library-app/s3-bucket \
            /library-app/app-version; do
            aws ssm delete-parameter --name "$param" 2>/dev/null || true
          done
          echo "SSM parameters deleted."
