name: CD

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Release: publish a GitHub Release with auto-generated changelog ──────────
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create the GitHub Release
    steps:
      - name: Validate release tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: $VERSION" >&2
            echo "Expected vMAJOR.MINOR.PATCH, optionally followed by a Docker-compatible prerelease suffix." >&2
            exit 1
          fi

      - name: Create GitHub Release with changelog
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Promote: GHCR sha → GHCR version tags + ECR; upload assets to S3 ─────────
  promote:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version:      ${{ steps.tag.outputs.version }}
      ecr_registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Derive short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get ECR registry
        id: ecr
        run: |
          REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

      - name: Promote app image GHCR → GHCR (version tags) + ECR
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/library-app
          ECR_IMAGE:  ${{ steps.ecr.outputs.registry }}/library-app
          VERSION:    ${{ steps.tag.outputs.version }}
          SHORT_SHA:  ${{ steps.sha.outputs.short }}
        run: |
          docker pull "${GHCR_IMAGE}:sha-${SHORT_SHA}"

          docker tag "${GHCR_IMAGE}:sha-${SHORT_SHA}" "${GHCR_IMAGE}:${VERSION}"
          docker tag "${GHCR_IMAGE}:sha-${SHORT_SHA}" "${GHCR_IMAGE}:latest"
          docker push "${GHCR_IMAGE}:${VERSION}"
          docker push "${GHCR_IMAGE}:latest"

          docker tag "${GHCR_IMAGE}:sha-${SHORT_SHA}" "${ECR_IMAGE}:${VERSION}"
          docker tag "${GHCR_IMAGE}:sha-${SHORT_SHA}" "${ECR_IMAGE}:latest"
          docker push "${ECR_IMAGE}:${VERSION}"
          docker push "${ECR_IMAGE}:latest"

      - name: Upload DB init scripts and compose file to S3
        run: |
          aws s3 sync db/init/ s3://${{ secrets.TF_BACKEND_BUCKET }}/db-init/ --delete
          aws s3 cp  docker-compose.prod.yml  s3://${{ secrets.TF_BACKEND_BUCKET }}/docker-compose.prod.yml

      - name: Store app version in SSM
        run: |
          aws ssm put-parameter \
            --name  "/library-app/app-version" \
            --value "${{ steps.tag.outputs.version }}" \
            --type  "String" \
            --overwrite

  # ── Deploy: run the deploy script on EC2 via SSM ─────────────────────────────
  deploy:
    needs: promote
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Send deploy command via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          # Base64-encode the deploy script to avoid JSON escaping issues
          # when passing as an SSM parameter. Single-quoted heredoc prevents
          # GitHub Actions from interpolating ${...} — those are EC2 bash vars.
          DEPLOY_SCRIPT=$(base64 -w 0 << 'SCRIPT_EOF'
          set -euo pipefail

          DB_PASSWORD=$(aws ssm get-parameter \
            --name /library-app/db-password \
            --with-decryption --query Parameter.Value --output text --region "$REGION")
          ECR_REGISTRY=$(aws ssm get-parameter \
            --name /library-app/ecr-registry \
            --query Parameter.Value --output text --region "$REGION")
          S3_BUCKET=$(aws ssm get-parameter \
            --name /library-app/s3-bucket \
            --query Parameter.Value --output text --region "$REGION")
          APP_VERSION=$(aws ssm get-parameter \
            --name /library-app/app-version \
            --query Parameter.Value --output text --region "$REGION")

          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          aws s3 sync "s3://${S3_BUCKET}/db-init/" /opt/library-app/db-init/ --delete --region "$REGION"

          aws s3 cp "s3://${S3_BUCKET}/docker-compose.prod.yml" \
            /opt/library-app/docker-compose.prod.yml --region "$REGION"

          cat > /opt/library-app/.env << ENV_EOF
          ECR_REGISTRY=${ECR_REGISTRY}
          APP_VERSION=${APP_VERSION}
          DB_USER=postgres
          DB_NAME=librarydb
          DB_PASSWORD=${DB_PASSWORD}
          ENV_EOF

          cd /opt/library-app
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "Waiting for app to become healthy..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "App is healthy after $((i * 10))s."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: app did not become healthy within 3 minutes." >&2
          docker compose -f docker-compose.prod.yml logs --tail=50
          exit 1
          SCRIPT_EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"export REGION=${REGION}; echo ${DEPLOY_SCRIPT} | base64 -d | bash\"]" \
            --region "$REGION" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command ID: $COMMAND_ID"

      - name: Wait for deploy and check result
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          REGION: ${{ vars.AWS_REGION }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          echo "Waiting for SSM command to finish..."
          RESULT=""
          STATUS="Pending"
          STATUS_DETAILS="Pending"

          for attempt in $(seq 1 60); do
            if RESULT=$(aws ssm get-command-invocation \
              --command-id   "$COMMAND_ID" \
              --instance-id  "$INSTANCE_ID" \
              --region       "$REGION" 2>/dev/null); then
              STATUS=$(echo "$RESULT" | jq -r '.Status')
              STATUS_DETAILS=$(echo "$RESULT" | jq -r '.StatusDetails')
              echo "SSM status: $STATUS_DETAILS"

              case "$STATUS" in
                Success|Failed|Cancelled|TimedOut|Cancelling)
                  break
                  ;;
              esac
            else
              echo "SSM invocation is not available yet."
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Deploy did not finish within 15 minutes. Last status: $STATUS_DETAILS" >&2
              exit 1
            fi

            sleep 15
          done

          OUTPUT=$(echo "$RESULT" | jq -r '.StandardOutputContent // ""')
          ERROR=$(echo  "$RESULT" | jq -r '.StandardErrorContent // ""')

          echo "--- stdout ---"
          echo "$OUTPUT"
          if [ -n "$ERROR" ]; then
            echo "--- stderr ---"
            echo "$ERROR"
          fi

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS_DETAILS"
            exit 1
          fi

          echo "Deploy succeeded."
