services:
  db:
    build: ./db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPass123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "StrongPass123!" -No
        -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name='LibraryDB') RAISERROR('not ready',16,1)"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  app:
    build: ./LibraryApp
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__LibraryDb: "Server=db,1433;Database=LibraryDB;User Id=sa;Password=StrongPass123!;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver-data:
