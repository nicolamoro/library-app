services:
  db:
    build: ./db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      DB_NAME: "${DB_NAME}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "${DB_SA_PASSWORD}" -No
        -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name='${DB_NAME}') RAISERROR('not ready',16,1)"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  app:
    build: ./LibraryApp
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__LibraryDb: "Server=${DB_SERVER},1433;Database=${DB_NAME};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver-data:
